name: Build Mirror APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Show repo structure
        run: find . -name "build.gradle" | head -10

      - name: Find Android project directory
        run: |
          BUILD_FILE=$(find . -name "build.gradle" | grep -v "\.gradle" | head -1)
          echo "Found build.gradle at: $BUILD_FILE"
          PROJECT_DIR=$(dirname "$BUILD_FILE")
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Project directory: $PROJECT_DIR"

      - name: Build Debug APK
        run: |
          cd $PROJECT_DIR
          gradle assembleDebug --stacktrace

      - name: Find APK
        run: find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mirror-debug
          path: "**/*.apk"
          retention-days: 7
